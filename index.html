
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>IIM Ranchi MBA Timetable Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body {
    margin: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: #fff;
}
header {
    padding: 20px;
    text-align: center;
    font-size: 28px;
    font-weight: bold;
    letter-spacing: 1px;
}
.container {
    padding: 20px;
}
.kpis {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 15px;
    margin-bottom: 25px;
}
.kpi {
    background: rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 20px;
    text-align: center;
    backdrop-filter: blur(6px);
}
.kpi h2 {
    margin: 0;
    font-size: 32px;
}
.kpi p {
    margin: 5px 0 0;
    opacity: 0.85;
}
.nav {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    margin-bottom: 20px;
}
.nav button {
    background: #ff9800;
    border: none;
    padding: 10px 15px;
    border-radius: 20px;
    cursor: pointer;
    font-weight: bold;
}
.nav button:hover {
    opacity: 0.85;
}
.dashboard {
    display: none;
}
.dashboard.active {
    display: block;
}
.card {
    background: #ffffff;
    border-radius: 16px;
    padding: 20px;
}
</style>
</head>
<body>

<header>📊 IIM Ranchi MBA Timetable – Smart Analytics Dashboard</header>

<div class="container">

<div class="kpis">
    <div class="kpi"><h2>10</h2><p>Total Weeks</p></div>
    <div class="kpi"><h2>7</h2><p>Days per Week</p></div>
    <div class="kpi"><h2>20</h2><p>Sessions per Course</p></div>
    <div class="kpi"><h2>10 → 4</h2><p>Rooms (Phase 1 → Phase 2)</p></div>
    <div class="kpi"><h2>0</h2><p>Faculty Conflicts</p></div>
    <div class="kpi"><h2>0</h2><p>Student Conflicts</p></div>
</div>

<div class="nav">
    <button onclick="showDash(0)">1. Classes per Day</button>
    <button onclick="showDash(1)">2. Classes per Week</button>
    <button onclick="showDash(2)">3. Room Utilization</button>
    <button onclick="showDash(3)">4. Faculty Load</button>
    <button onclick="showDash(4)">5. Course Sessions</button>
    <button onclick="showDash(5)">6. Section Load</button>
    <button onclick="showDash(6)">7. Slot Utilization</button>
    <button onclick="showDash(7)">8. Sunday vs Weekday</button>
    <button onclick="showDash(8)">9. Phase Comparison</button>
    <button onclick="showDash(9)">10. Faculty per Day</button>
</div>

<div id="dashboards">
    
    <div class="dashboard active">
        <div class="card">
            <canvas id="chart0"></canvas>
        </div>
    </div>
    
    <div class="dashboard ">
        <div class="card">
            <canvas id="chart1"></canvas>
        </div>
    </div>
    
    <div class="dashboard ">
        <div class="card">
            <canvas id="chart2"></canvas>
        </div>
    </div>
    
    <div class="dashboard ">
        <div class="card">
            <canvas id="chart3"></canvas>
        </div>
    </div>
    
    <div class="dashboard ">
        <div class="card">
            <canvas id="chart4"></canvas>
        </div>
    </div>
    
    <div class="dashboard ">
        <div class="card">
            <canvas id="chart5"></canvas>
        </div>
    </div>
    
    <div class="dashboard ">
        <div class="card">
            <canvas id="chart6"></canvas>
        </div>
    </div>
    
    <div class="dashboard ">
        <div class="card">
            <canvas id="chart7"></canvas>
        </div>
    </div>
    
    <div class="dashboard ">
        <div class="card">
            <canvas id="chart8"></canvas>
        </div>
    </div>
    
    <div class="dashboard ">
        <div class="card">
            <canvas id="chart9"></canvas>
        </div>
    </div>
    
</div>

<script>
const dashboards = document.querySelectorAll('.dashboard');
function showDash(i) {
    dashboards.forEach((d, idx) => {
        d.classList.toggle('active', idx === i);
    });
}

// Dummy sample data placeholders (replace later with real exports if needed)
const labelsWeek = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
const sampleData = [
    [30,28,32,31,29,20,10],
    [50,48,52,51,49,47,45,44,43,42],
    [40,35,30,25,20,15,10,5,3,2],
    [12,10,9,11,8,7],
    [20,20,20,20,20],
    [18,19,17,20,16,15],
    [15,18,22,20,19,17,16],
    [80,420],
    [300,200],
    [60,55,58,57,59,50,45]
];

for (let i = 0; i < 10; i++) {
    const ctx = document.getElementById('chart'+i).getContext('2d');
    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: sampleData[i].map((_, idx) => "Item " + (idx+1)),
            datasets: [{
                label: "Metric " + (i+1),
                data: sampleData[i]
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: { display: true },
                title: {
                    display: true,
                    text: "Dashboard " + (i+1)
                }
            }
        }
    });
}
</script>

</body>
</html>
